name: YellowParticlesPlugin
version: 1.0.0
main: com.example.yellowparticles.YellowParticlesPlugin
api-version: 1.20
author: YourName
description: Плагин с жёлтым эффектом капающих частиц

commands:
  mocha:
    description: Активирует эффект жёлтых капающих частиц у ног игрока
    usage: /mocha
    permission: yellowparticles.use

permissions:
  yellowparticles.use:
    description: Разрешает использование команды /mocha
    default: true
